services:
  postgres:
    image: postgres:16-alpine
    container_name: solidus-website-postgres
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: solidus-website
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: solidus-website-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: solidus-website-app
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgres://payload:${POSTGRES_PASSWORD}@postgres:5432/solidus-website
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-key-change-in-production}
      NEXT_PUBLIC_SERVER_URL: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
